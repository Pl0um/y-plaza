services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kreagency-backend
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000
      - CORS_ORIGIN=http://localhost
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - vnet
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kreagency-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - vnet
    restart: unless-stopped

networks:
  vnet:
    driver: bridge
